<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- 背景用グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- ゴールド（蓮の花）用グラデーション -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="30%" stop-color="#d97706" />
      <stop offset="70%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
    <!-- ゴールドの光沢効果 -->
    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- 背景円 -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="480" height="480" x="16" y="16" rx="112" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.3" />

  <!-- 蓮の花のシンボル（幾何学的モダンデザイン） -->
  <g transform="translate(256, 280) scale(1.1)">
    <!-- 外側の花びら（左） -->
    <path d="M-120,-30 C-160,-10 -150,40 -80,50 C-110,20 -110,-10 -120,-30 Z" fill="url(#goldGrad)" />
    <!-- 外側の花びら（右） -->
    <path d="M120,-30 C160,-10 150,40 80,50 C110,20 110,-10 120,-30 Z" fill="url(#goldGrad)" />
    
    <!-- 中間の花びら（左） -->
    <path d="M-80,-60 C-120,-30 -100,50 -40,60 C-70,20 -60,-20 -80,-60 Z" fill="url(#goldGrad)" />
    <!-- 中間の花びら（右） -->
    <path d="M80,-60 C120,-30 100,50 40,60 C70,20 60,-20 80,-60 Z" fill="url(#goldGrad)" />
    
    <!-- 内側の花びら（左） -->
    <path d="M-40,-90 C-70,-50 -60,50 0,70 C-30,20 -20,-40 -40,-90 Z" fill="url(#goldGrad)" />
    <!-- 内側の花びら（右） -->
    <path d="M40,-90 C70,-50 60,50 0,70 C30,20 20,-40 40,-90 Z" fill="url(#goldGrad)" />
    
    <!-- 中央の花びら（真ん中） -->
    <path d="M0,-110 C-30,-60 -25,40 0,80 C25,40 30,-60 0,-110 Z" fill="url(#goldGrad)" />
    
    <!-- 台座・水面ライン -->
    <path d="M-100,75 L100,75 C80,95 20,105 0,105 C-20,105 -80,95 -100,75 Z" fill="url(#goldGrad)" />
    <path d="M-60,88 L60,88 C40,98 10,102 0,102 C-10,102 -40,98 -60,88 Z" fill="url(#goldGrad)" opacity="0.7" />
  </g>

  <!-- 上部からの光の演出 -->
  <path d="M128,16 L384,16 C384,16 320,120 256,120 C192,120 128,16 128,16 Z" fill="url(#goldGlow)" opacity="0.15" />
</svg>
